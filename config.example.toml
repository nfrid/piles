# piles configuration
# copy to ~/.config/piles/config.toml

# number of workspaces (1-9)
# workspace_count = 9

# master window width ratio (0.0-1.0)
# master_ratio = 0.55

# default layout for each workspace: "monocle" or "tile"
# default_layout = "monocle"

# global modifier key: "option", "control", "command"
# modifier = "option"

# built-in action bindings
# key names: a-z, 0-9, return, tab, space, escape, delete,
#   comma, period, slash, backslash, minus, equal, grave,
#   leftbracket, rightbracket, semicolon, quote
# prefix with shift+ for shift modifier
# [bindings]
# focus_next = "j"
# focus_prev = "k"
# workspace_next = "l"
# workspace_prev = "h"
# swap_master = "return"
# toggle_layout = "m"
# focus_monitor_prev = "comma"
# focus_monitor_next = "period"
# move_monitor_prev = "shift+comma"
# move_monitor_next = "shift+period"
# last_workspace = "tab"
# workspace_overview = "o"

# custom key bindings that run shell commands
# [[custom]]
# key = "shift+return"
# command = "open -n -a Terminal"

# window assignment rules
# first matching rule wins; monitor, workspace, and position are 1-based
# match by any combination of app, bundle_id, title, and title_contains
# [[assign]]
# app = "Terminal"
# workspace = 1
# position = 1
#
# [[assign]]
# bundle_id = "com.apple.Safari"
# title_contains = "Developer"
# monitor = 1
# workspace = 2
# position = 1
